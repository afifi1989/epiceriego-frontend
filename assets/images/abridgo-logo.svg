  <!-- Right road edge -->
  <path d="M170 178 Q100 90 100 60" fill="none" stroke="#2ECC71" stroke-width="14" stroke-linecap="round"/>
  <!-- Center dashes -->
  <path d="M100 160 Q100 130 100 110" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 10"/>
  <!-- Vanishing point pin (gold) -->
