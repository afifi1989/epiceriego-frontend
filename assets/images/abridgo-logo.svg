<svg width="1024" height="1024" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f4c2a"/>
      <stop offset="100%" stop-color="#1a6b3e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
